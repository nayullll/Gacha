        function drawLyric() {
            if (isRolling) return; // 이미 굴러가고 있으면 버튼 클릭 무시
            isRolling = true;
            
            const btn = document.querySelector('button');
            btn.innerText = "도르르륵...";
            btn.style.backgroundColor = "#a4b0be"; // 버튼 색상을 회색으로 변경
            
            let rollCount = 0;
            
            // 0.05초(50ms)마다 가사를 무작위로 바꿈 (슬롯머신 효과)
            const rollInterval = setInterval(() => {
                const tempIndex = Math.floor(Math.random() * lyrics.length);
                resultDisplay.innerText = lyrics[tempIndex];
                rollCount++;

                // 30번 굴러가면 (약 1.5초 후) 멈춤!
                if (rollCount > 30) {
                    clearInterval(rollInterval); // 굴러가는 타이머 종료
                    
                    // 진짜 최종 결과 뽑기
                    const finalIndex = Math.floor(Math.random() * lyrics.length);
                    const finalLyric = lyrics[finalIndex];
                    
                    resultDisplay.innerText = "✨ " + finalLyric + " ✨";

                    // 저장 데이터 생성
                    const savedItem = {
                        text: finalLyric,
                        date: new Date().toLocaleString()
                    };

                    saveToLocal(savedItem);
                    displayHistory();

                    // 버튼 원상복구
                    isRolling = false;
                    btn.innerText = "가사 뽑기";
                    btn.style.backgroundColor = "var(--primary-color)";
                }
            }, 50);
        }

        function saveToLocal(item) {
            let history = JSON.parse(localStorage.getItem('lyricHistory')) || [];
            history.unshift(item); 
            localStorage.setItem('lyricHistory', JSON.stringify(history));
        }

        function displayHistory() {
            let history = JSON.parse(localStorage.getItem('lyricHistory')) || [];
            historyList.innerHTML = '';

            history.forEach(item => {
                const li = document.createElement('li');
                li.className = 'history-item';
                li.innerHTML = `<span class="date">${item.date}</span> ${item.text}`;
                historyList.appendChild(li);
            });
        }
    </script>
</body>
</html>
