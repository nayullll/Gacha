<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>오늘의 가사 가챠</title>
    
    <meta property="og:title" content="길을 걷다 만난 노래">
    <meta property="og:description" content="길을 걷다 만난 노래가 네 하루를 말할 거야">
    <meta property="og:image" content="https://images.unsplash.com/photo-1493225457284-0bf53ce18dc6?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80">
    
    <style>
        :root {
            --primary-color: #6c5ce7;
            --bg-color: #f9f9f9;
        }
        body {
            font-family: 'Pretendard', -apple-system, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: var(--bg-color);
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 400px;
            width: 100%;
            text-align: center;
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            box-sizing: border-box;
        }
        .display-area {
            min-height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
            font-weight: bold;
            margin: 20px 0;
            padding: 20px;
            border: 2px dashed #ddd;
            border-radius: 10px;
            color: #333;
            line-height: 1.5;
            word-break: keep-all;
        }
        button {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 30px;
            font-size: 1rem;
            cursor: pointer;
            transition: transform 0.2s;
            width: 80%;
        }
        button:active { transform: scale(0.95); }
        
        .history {
            margin-top: 40px;
            width: 100%;
            max-width: 400px;
        }
        .history h3 { 
            border-bottom: 2px solid var(--primary-color); 
            padding-bottom: 5px; 
            color: #333;
        }
        .history-list {
            list-style: none;
            padding: 0;
        }
        .history-item {
            background: white;
            margin-bottom: 10px;
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            font-size: 0.95rem;
            line-height: 1.4;
            position: relative;
            word-break: keep-all;
        }
        .date {
            display: block;
            font-size: 0.75rem;
            color: #888;
            margin-bottom: 5px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>✨ 오늘의 가사 뽑기</h2>
        <div class="display-area" id="resultDisplay">
            버튼을 눌러 가챠를 시작하세요!
        </div>
        <button onclick="drawLyric()">가사 뽑기</button>
    </div>

    <div class="history">
        <h3>📚 저장된 가사 보관함</h3>
        <ul class="history-list" id="historyList">
        </ul>
    </div>

    <script>
        const lyrics = [
            "걱정했던 많은 날들이 다 꿈만 같아요",
            "그저 대단한 걸 바라지 않아도 괜찮아 너를 알았으니까",
            "날이 조금 더 좋다면 어떨까 그렇지만 나는 역시 지금이 좋아",
            "언제나 너와 같은 마음으로 세상을 보고 그리면서 살 거야",
            "길을 걷다 만난 너에게 내 꿈을 말할 거야",
            "하루하루 멀어지는 건 참 어려워",
            "아무리 애를 쓰고 바라도 넌 내 마음대로 안돼",
            "혼자 있는 더운 날엔 네가 생각나 작은 너의 바람 내겐 숨이 되어와",
            "바랐었던 그대로는 아니지만 이것도 괜찮은 것 같아",
            "왜 멀어져야 생각날까 조금 늦진 않았을까"
        ];

        const resultDisplay = document.getElementById('resultDisplay');
        const historyList = document.getElementById('historyList');

        window.onload = displayHistory;

        function drawLyric() {
            const randomIndex = Math.floor(Math.random() * lyrics.length);
            const selectedLyric = lyrics[randomIndex];
            
            resultDisplay.innerText = selectedLyric;

            const savedItem = {
                text: selectedLyric,
                date: new Date().toLocaleString()
            };

            saveToLocal(savedItem);
            displayHistory();
        }

        function saveToLocal(item) {
            let history = JSON.parse(localStorage.getItem('lyricHistory')) || [];
            history.unshift(item); 
            localStorage.setItem('lyricHistory', JSON.stringify(history));
        }

        function displayHistory() {
            let history = JSON.parse(localStorage.getItem('lyricHistory')) || [];
            historyList.innerHTML = '';

            history.forEach(item => {
                const li = document.createElement('li');
                li.className = 'history-item';
                li.innerHTML = `<span class="date">${item.date}</span> ${item.text}`;
                historyList.appendChild(li);
            });
        }
    </script>
</body>
</html>
